# general
set-environment -g PATH "$HOME/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
set -g mode-keys vi
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g history-limit 999999999
setw -g mouse on
set -s escape-time 0
set -g default-shell $SHELL
set -g focus-events on
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"

# colors
set -g pane-active-border-style "bg=default,fg=colour28"
set -g pane-border-style "bg=default,fg=colour8"
set -g status-style "bg=default,fg=default"
set -g message-style "fg=colour15,bg=default"
set -g pane-border-status bottom
set -g pane-border-format "#(tmux-pane-label #{pane_pid} #{pane_current_command} | sed 's/^claude$/ #[fg=colour208]＊Claude#[default] /;s/^codex$/ #[fg=colour63]Codex#[default] /;s/^helix$/ #[fg=colour141]Helix#[default] /;t;s/.*//')"

# status bar
set -g status-left " #[fg=brightwhite,bold]#S:#I #[fg=colour240]#{pane_current_path}#F "
set -g status-right '#(gitmux -cfg ~/.config/gitmux/gitmux.conf "#{pane_current_path}" 2>/dev/null || basename "#{pane_current_path}")'
set -g status-left-length 80
set -g status-right-length 30
set -g automatic-rename on
set -g automatic-rename-format '#(tmux-window-name "#{pane_current_path}" #{pane_pid} #{pane_current_command})'
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-bell-style "fg=red,bold"
set -g window-status-current-style ""

# split with pane_current_path
bind c new-window -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded."

# copy-mode-vi
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-c send -X clear-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi C-a send -X start-of-line
bind-key -T copy-mode-vi C-e send -X end-of-line
bind-key -T copy-mode-vi C-d send -X page-down
bind-key -T copy-mode-vi C-u send -X page-up
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi w send -X next-word
bind-key -T copy-mode-vi e send -X next-word-end
bind-key -T copy-mode-vi b send -X previous-word
bind-key -T copy-mode-vi g send -X top-line
bind-key -T copy-mode-vi G send -X bottom-line

# Customize keybinds {{{1
## Change active pane
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

## Resize pane
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

## copy-mode `C-b [`
bind-key C-b copy-mode

# bell notification (for Claude Code permission prompts)
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# choose-tree
bind w run 'tmux choose-tree -Zwf "##{==:##{session_name},#S}"'
bind W choose-tree -Zw

# Claude Code pane management
bind C run-shell 'tmux-claude-panes'
bind a display-menu -T "Actions" \
  "Rename sessions"  r "run-shell 'tmux-rename-sessions'" \
  ""                                                         \
  "Claude status"    s "display-popup -w 80% -h 60% -E 'tmux-claude-status | column -t | less -R'" \
  "Claude panes"     c "run-shell 'tmux-claude-panes'" \
  "Claude send"      m "command-prompt -p 'target:,message:' 'run-shell \"tmux-claude-send %1 \\\"%2\\\"\"'" \
  "Claude launch"    l "command-prompt -p 'target:' 'run-shell \"tmux-claude-launch %1\"'"
