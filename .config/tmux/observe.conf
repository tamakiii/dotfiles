# Dashboard tmux config — loaded by `tmux-observe`.
#
# A second tmux server (typically `tmux -L observe`) used to observe and
# control panes on the main tmux server via tmux-main(1). This file is
# only loaded by tmux-observe via `-f`; the main server keeps using
# ~/.config/tmux/tmux.conf without these overrides.
#
# Strategy: inherit everything from the main config, then override the
# few bindings that should behave differently in the observe server.

source-file -q ~/.config/tmux/tmux.conf

# prefix-a: pop up a tmux-main repl picker. Replaces the main config's
# Actions menu in this server (the menu is for the main-server workflow;
# observe has different needs). Picker → repl runs sequentially in the
# popup; Ctrl-D in the repl closes the popup (-E).
bind a display-popup -E -w 80% -h 40% \
  -T ' tmux-main repl ' \
  'tmux-main repl "$(tmux-main pick)"'
