# Dashboard tmux config — loaded by `tmux-observe`.
#
# A second tmux server (typically `tmux -L observe`) used to observe and
# control panes on the main tmux server via tmux-main(1). This file is
# only loaded by tmux-observe via `-f`; the main server keeps using
# ~/.config/tmux/tmux.conf without these overrides.
#
# Strategy: inherit everything from the main config, then override the
# few bindings that should behave differently in the observe server.

source-file -q ~/.config/tmux/tmux.conf

bind R source-file ~/.config/tmux/observe.conf \; display-message "Tmux config reloaded."

# Unbind the default prefix (Ctrl-b)
unbind C-b

# Set the new prefix to Ctrl-a
set-option -g prefix C-a

# Allow sending the prefix to applications (e.g., for nested tmux or Vim)
# This lets you press Ctrl-a twice to send a literal Ctrl-a
bind-key C-b send-prefix

# Step 1 smoke-test: C-a T → bare popup that waits for Enter.
# If this appears, display-popup is working on the observe server.
bind T display-popup -E -w 60% -h 30% \
  'printf "Step 1: popup works.\n\nPress Enter to close: "; read'

# prefix-a: observe-tailored Actions menu. Overrides the main config's
# menu (which is Claude-Code-focused) with entries useful when observing
# the main tmux server. Each action delegates to a small wrapper script
# in bin/ so the tmux config stays free of nested-quote escaping.
bind a display-menu -T "Actions" \
  "Rename sessions"   r "run-shell 'tmux-rename-sessions'" \
  ""                                                         \
  "Find pane"          f "display-popup -E -e TMUX_CALLER_PANE=#{pane_id} -w 80% -h 60% 'tmux-observe-view 2>&1'" \
  "Open repl"          i "if-shell -F '#{@view_target}' 'display-popup -E -e TMUX_CALLER_PANE=#{pane_id} -w 80% -h 60% tmux-observe-repl' 'display-message \"No view active — open one with Prefix-a → f first\"'"
