name: Add to Kanban

on:
  issues:
    types: [opened, reopened, transferred]
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      # No floating v1 tag exists; pin to the latest specific release.
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/tamakiii/projects/5
          github-token: ${{ secrets.PROJECTS_TOKEN }}
