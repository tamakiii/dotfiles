name: Add to Kanban

# Token-shim variant: tamakiii/dotfiles is public, so GitHub's built-in
# "Accessible from repositories owned by the user" setting on the private
# tamakiii/meta doesn't apply (access is only granted to private callers).
# To still consume the central composite action, check the action out via
# actions/checkout with a fine-grained PAT scoped to Contents:Read on
# tamakiii/meta only, then reference it locally.
#
# Required secret on this repo: META_READ_PAT — a fine-grained PAT issued
# by tamakiii, resource owner 'tamakiii', repository access limited to
# 'tamakiii/meta', permissions Contents:Read-only (nothing else). Rotate
# within the PAT's 1-year lifetime.
#
# The 4 private siblings (claudius, home, myfiles, openclaw-workspace) use
# the simpler shim form without checkout/token. See tamakiii/meta#458 for
# the rollout history.

on:
  issues:
    types: [opened, reopened, transferred, closed]
  pull_request:
    types: [opened, reopened, closed]

permissions:
  contents: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out meta's add-to-kanban action
        uses: actions/checkout@v5
        with:
          repository: tamakiii/meta
          ref: main
          token: ${{ secrets.META_READ_PAT }}
          path: .meta-action
          sparse-checkout: .github/actions/add-to-kanban
          sparse-checkout-cone-mode: false
      - uses: ./.meta-action/.github/actions/add-to-kanban
        with:
          projects-token: ${{ secrets.PROJECTS_TOKEN }}
          project-url: ${{ vars.KANBAN_PROJECT_URL || 'https://github.com/users/tamakiii/projects/5' }}
